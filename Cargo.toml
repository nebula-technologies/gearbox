[package]
name = "gearbox"
version = "0.0.2"
edition = "2021"
authors = ["Anders Blenstrup-Pedersen <abp-git@ryuu.technology>"]
description = "Excessive tooling for Rust"
readme = "README.md"
categories = [""]
keywords = ["tooling"]
license = "MIT"
repository = "https://github.com/nebula-technologies/gearbox"

# See more keys and their definitions at https://doc.rust-lang.org/cargo/reference/manifest.html

[features]
default = ["web"]
web = ["web-sys", "web-storage"]
web-storage = ["web-sys/Storage", "web-sys/Window"]

[dependencies]
serde_json = "1"
serde_yaml = "0.9"
serde = "1"
tracing = "0.1.40"
libc = "0.2.153"
dirs = "5.0.1"
tracing-subscriber = "0.3.18"
time = "0.3.34"
num-traits = "0.2.18"


[dependencies.web-sys]
version = "0.3.67"
optional = true

[target.'cfg(not(target_arch = "wasm32"))'.dependencies.tokio]
version = "1"
features = ["rt-multi-thread", "rt", "macros"]



